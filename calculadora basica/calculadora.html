<!DOCTYPE html> 
<html>
    <head>
        <title>
            Calculadora
        </title>
    </head>
    <body>
        <h1>
            Calculadora basica  
        </h1>
        <form>
            <label>
                Ingresa primer numero
            </label>
            <br>
            <input type = "number" id = "num1">
            </input>
            <br>
            <label>
                Ingresa el segundo numero
            </label>
            <br>
            <input type = "number" id = "num2">
            </input>
            <br>
            <input type = "button" value = "Suma" onclick=suma()>
            </input>
            <br>
            <input type = "button" value = "Resta" onclick = resta()>
            </input>
            <br>
            <input type = "button" value = "Multiplicacion" onclick = multiplicacion()>
            </input>
            <br>
            <input type = "button" value = "Division" onclick = division()>
            </input>
        </form>
        <script src = "calculadora.js">

        </script>
    </body>

    
</html>    
</DOCTYPE>
