<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="plantilla(contenido)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión Clínica | Dashboard</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link text-danger" th:href="@{/auth/logout}">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-info elevation-4">
        <a th:href="@{/}" class="brand-link bg-info">
            <i class="fas fa-hospital-alt brand-image mt-1 ml-3" style="opacity: .8; font-size: 1.5rem;"></i>
            <span class="brand-text font-weight-light">Gestión Clínica</span>
        </a>

        <div class="sidebar">

            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image">
                    <i class="fas fa-user-circle text-light mt-1" style="font-size: 1.8rem;"></i>
                </div>
                <div class="info">
                    <a href="#" class="d-block font-weight-bold" th:text="${session.usuarioLogueado != null ? session.usuarioLogueado.nombre : 'Invitado'}">Usuario</a>
                </div>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
                    <li class="nav-item">
                        <a th:href="@{/pacientes}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Pacientes</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/citas}" class="nav-link">
                            <i class="nav-icon fas fa-calendar-check"></i>
                            <p>Citas Médicas</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content pt-4">
            <div th:replace="${contenido}"></div>
        </section>
    </div>

    <footer class="main-footer">
        <div class="float-right d-none d-sm-inline">UPIIZ - Proyecto Final</div>
        <strong>Copyright &copy; 2026.</strong> Todos los derechos reservados.
    </footer>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
