<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clínica | Recuperar Contraseña</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/icheck-bootstrap/icheck-bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition login-page" style="background-color: #f4f6f9;">
<div class="login-box">
    <div class="login-logo">
        <a th:href="@{/}"><b class="text-info">Gestión</b> Clínica</a>
    </div>

    <div class="card card-outline card-info">
        <div class="card-body login-card-body">
            <p class="login-box-msg">¿Olvidaste tu contraseña de acceso? Ingresa tu correo para recuperarla.</p>

            <form th:action="@{/auth/recover-password}" method="post">
                <div class="input-group mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Correo electrónico" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-envelope text-info"></span>
                        </div>
                    </div>
                </div>

                <div th:if="${error}" class="alert alert-danger p-2 text-center text-sm">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${mensaje}" class="alert alert-success p-2 text-center text-sm">
                    <span th:text="${mensaje}"></span>
                </div>

                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-info btn-block">Solicitar nueva contraseña</button>
                    </div>
                </div>
            </form>

            <p class="mt-3 mb-1">
                <a th:href="@{/auth/login}" class="text-center text-info">Volver a Iniciar Sesión</a>
            </p>
            <p class="mb-0">
                <a th:href="@{/auth/register}" class="text-center text-info">Registrar nuevo usuario</a>
            </p>
        </div>
    </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
