<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/layout :: plantilla(~{::#contenido_pacientes})}">
<head>
    <title>Pacientes</title>
</head>
<body>

<div id="contenido_pacientes">
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-info"><i class="fas fa-users"></i> Listado de Pacientes</h1>
                </div>
                <div class="col-sm-6 text-right">
                    <a th:href="@{/pacientes/nuevo}" class="btn btn-info">
                        <i class="fas fa-plus"></i> Nuevo Paciente
                    </a>
                </div>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div class="card card-outline card-info">
                <div class="card-header">
                    <h3 class="card-title">Registros Actuales</h3>
                </div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover">
                        <thead class="bg-info text-white">
                        <tr>
                            <th>ID</th>
                            <th>Nombre Completo</th>
                            <th>Fecha de Nacimiento</th>
                            <th>Género</th>
                            <th>Teléfono</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="paciente : ${pacientes}">
                            <td th:text="${paciente.idPaciente}">1</td>
                            <td th:text="${paciente.nombreCompleto}">Juan Pérez</td>
                            <td th:text="${paciente.fechaNacimiento}">1990-01-01</td>
                            <td th:text="${paciente.genero}">M</td>
                            <td th:text="${paciente.telefono}">555-1234</td>
                            <td class="text-center">
                                <a th:href="@{/pacientes/editar/{id}(id=${paciente.idPaciente})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/pacientes/eliminar/{id}(id=${paciente.idPaciente})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de eliminar a este paciente?');">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pacientes)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                No hay pacientes registrados en el sistema.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
