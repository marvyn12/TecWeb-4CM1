<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fifa - UPIIZ</title>
    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .image-container {
            margin-bottom: 40px;
            max-width: 600px;
        }
        .fifa-logo {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .nav-container {
            display: flex;
            gap: 20px;
        }
        a {
            text-decoration: none;
            color: white;
            background-color: #003366;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        a:hover {
            background-color: #001933;
            text-decoration: none;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="image-container">
    <img th:src="@{/fifa.png}" alt="FIFA Logo" class="fifa-logo">
</div>

<div class="nav-container">
    <a th:href="@{/jugadores}">Jugadores</a>
    <a th:href="@{/entrenadores}">Entrenadores</a>
</div>
</body>
</html>
