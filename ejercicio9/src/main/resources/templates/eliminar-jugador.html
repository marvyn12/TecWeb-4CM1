<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Jugador - Champions</title>
    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        h2 {
            color: #dc3545;
            font-size: 2.5em;
            border-bottom: 2px solid #dc3545;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        a {
            text-decoration: none;
            color: #0055a4;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }
        form {
            background: white;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: left;
        }
        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #e9ecef;
            font-family: sans-serif;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #dc3545;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
<h2>Eliminar Jugador</h2>
<a th:href="@{/jugadores}">Regresar</a>

<form th:action="@{/jugadores/borrar/{id}(id=${jugador.id})}" method="post">
    <label>Nombre:</label>
    <input type="text" th:field="${jugador.nombre}" readonly>

    <label>Posición:</label>
    <input type="text" th:field="${jugador.posicion}" readonly>

    <label>Número:</label>
    <input type="text" th:field="${jugador.numero}" readonly>

    <button type="submit">Eliminar Definitivamente</button>
</form>
</body>
</html>
