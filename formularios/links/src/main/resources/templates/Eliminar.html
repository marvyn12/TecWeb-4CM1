<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Mascota</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            margin-top: 20px;
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<a href="index.html">Cancelar</a>

<h1>Eliminar Mascota</h1>

<form action="index.html">
    <table>
        <thead>
        <tr>
            <th>Campo</th>
            <th>Dato</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Nombre</td>
            <td><input type="text" name="nombre" placeholder="MAX"></td>
        </tr>
        <tr>
            <td>Raza</td>
            <td>
                <select name="raza">
                    <option value="">Seleccione</option>
                    <option value="gran_perro">Gran Perro</option>
                    <option value="pastor_aleman">Pastor Aleman</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>Edad</td>
            <td><input type="number" name="edad" placeholder="5"></td>
        </tr>
        <tr>
            <td>Observaciones</td>
            <td><input type="text" name="observaciones" placeholder="Muy Peligroso"></td>
        </tr>
        </tbody>
    </table>

    <button type="submit">Eliminar</button>
</form>

</body>
</html>
