<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Abarrotes Doña Toti</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .brand-link, .main-header {
            background-color: #006847 !important;
            color: white !important;
        }
        .nav-sidebar .nav-link.active, .btn-primary, .bg-primary {
            background-color: #006847 !important;
            border-color: #006847 !important;
            color: white !important;
        }
        .text-primary {
            color: #006847 !important;
        }
    </style>
</head>

<body>
<nav th:fragment="navbar" class="main-header navbar navbar-expand navbar-dark">
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
        </li>
    </ul>
    <ul class="navbar-nav ml-auto">
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/logout}">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesion
            </a>
        </li>
    </ul>
</nav>

<aside th:fragment="sidebar" class="main-sidebar sidebar-light-primary elevation-4">
    <a th:href="@{/}" class="brand-link text-center">
        <span class="brand-text font-weight-bold">Abarrotes Doña Toti</span>
    </a>
    <div class="sidebar">
        <div class="user-panel mt-3 pb-3 mb-3 d-flex align-items-center">
            <div class="image">
                <i class="fas fa-user-circle fa-2x text-secondary"></i>
            </div>
            <div class="info">
                <a href="#" class="d-block font-weight-bold text-dark" th:text="${session.usuarioLogueado != null ? session.usuarioLogueado.nombre : 'Usuario'}"></a>
            </div>
        </div>
        <nav class="mt-2">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link">
                        <i class="nav-icon fas fa-chart-pie"></i>
                        <p>Dashboard</p>
                    </a>
                </li>
                <li class="nav-item" th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">
                    <a th:href="@{/productos}" class="nav-link">
                        <i class="nav-icon fas fa-box"></i>
                        <p>Inventario</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/ventas/punto-venta}" class="nav-link">
                        <i class="nav-icon fas fa-cash-register"></i>
                        <p>Punto de Venta</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/ventas}" class="nav-link">
                        <i class="nav-icon fas fa-file-invoice-dollar"></i>
                        <p>Historial y Facturas</p>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</aside>

<div th:fragment="scripts">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</div>
</body>
</html>
