<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #dc3545; border-bottom: 2px solid #dc3545; padding-bottom: 10px; }
        .btn { display: inline-block; padding: 10px 15px; text-decoration: none; border-radius: 5px; color: white; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #a71d2a; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        ul { list-style-type: none; padding: 0; font-size: 1.1em; margin-bottom: 20px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 5px; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>⚠️ Confirmar Eliminación</h2>

    <p>¿Estás completamente seguro de que deseas eliminar la siguiente materia?</p>

    <ul>
        <li><strong>ID:</strong> <span th:text="${materia.id}"></span></li>
        <li><strong>Nombre:</strong> <span th:text="${materia.nombre}"></span></li>
        <li><strong>Créditos:</strong> <span th:text="${materia.creditos}"></span></li>
    </ul>

    <form th:action="@{/materias/borrar/{id}(id=${materia.id})}" method="post">
        <button type="submit" class="btn btn-danger">Sí, Eliminar Definitivamente</button>
        <a th:href="@{/materias}" class="btn btn-secondary">No, Cancelar y Regresar</a>
    </form>
</div>
</body>
</html>
