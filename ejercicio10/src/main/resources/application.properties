spring.application.name=plantillas

# Asegurate de que este puerto sea el que esta en VERDE en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3307/db_plantillas?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Esto evita que Spring intente adivinar la version
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081
