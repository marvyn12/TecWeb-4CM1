<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/layout :: head('Punto de Venta')}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav th:replace="~{layout/layout :: navbar}"></nav>
    <aside th:replace="~{layout/layout :: sidebar}"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <h1>Punto de Venta</h1>
            </div>
        </section>

        <section class="content">
            <div class="row">
                <div class="col-md-6">
                    <div class="card card-primary">
                        <div class="card-header"><h3 class="card-title">Agregar Producto al Carrito</h3></div>
                        <form th:action="@{/ventas/agregar}" method="post">
                            <div class="card-body">
                                <div class="form-group">
                                    <label>Producto</label>
                                    <select name="productoId" class="form-control" required>
                                        <option value="">Seleccione...</option>
                                        <option th:each="p : ${productos}"
                                                th:value="${p.id}"
                                                th:text="${p.nombre} + ' - $' + ${p.precio} + ' (Stock: ' + ${p.stock} + ')'"
                                                th:if="${p.stock > 0}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Cantidad</label>
                                    <input type="number" name="cantidad" class="form-control" min="1" value="1" required>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-cart-plus"></i> Agregar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card card-success">
                        <div class="card-header"><h3 class="card-title">Carrito Actual</h3></div>
                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover text-nowrap">
                                <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Cant.</th>
                                    <th>Subtotal</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="item : ${carrito}">
                                    <td th:text="${item.producto.nombre}"></td>
                                    <td th:text="${item.cantidad}"></td>
                                    <td th:text="'$' + ${item.subtotal}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="card-footer">
                            <form th:action="@{/ventas/procesar}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-success" th:disabled="${carrito == null or carrito.empty}">
                                    <i class="fas fa-check"></i> Procesar Venta
                                </button>
                            </form>
                            <a th:href="@{/ventas/limpiar}" class="btn btn-danger float-right">
                                <i class="fas fa-trash"></i> Vaciar Carrito
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
