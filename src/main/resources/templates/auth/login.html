<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Abarrotes Doña Toti</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .btn-verde-bandera {
            background-color: #006847;
            border-color: #006847;
            color: white;
        }
        .btn-verde-bandera:hover {
            background-color: #004d35;
            color: white;
        }
        .login-card-body {
            border-top: 5px solid #006847;
            border-radius: 5px;
        }
        .text-verde {
            color: #006847;
            font-weight: bold;
        }
    </style>
</head>
<body class="hold-transition login-page bg-light">
<div class="login-box">
    <div class="login-logo mb-4">
        <i class="fas fa-store fa-2x text-verde mb-2 d-block"></i>
        <a href="#" class="text-verde"><b>Abarrotes</b> Doña Toti</a>
    </div>
    <div class="card shadow">
        <div class="card-body login-card-body">
            <p class="login-box-msg font-weight-bold">Inicia sesion para empezar</p>

            <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="input-group mb-3">
                    <input type="email" class="form-control" placeholder="Correo Electrónico" name="email" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-envelope text-verde"></span>
                        </div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" class="form-control" placeholder="Contraseña" name="password" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock text-verde"></span>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12">
                        <button type="submit" class="btn btn-verde-bandera btn-block font-weight-bold">Entrar al Sistema</button>
                    </div>
                </div>
            </form>

            <p class="mb-1 mt-4 text-center">
                <a th:href="@{/forgot-password}" class="text-secondary">Olvide mi password</a>
            </p>
            <p class="mb-0 text-center mt-2">
                <a th:href="@{/register}" class="text-verde">Registrar un nuevo usuario</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
